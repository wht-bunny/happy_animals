<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VLESS Key Checker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 36px;
      font-size: 0.95rem;
    }

    .card {
      background: #1e1e2e;
      border: 1px solid #2d2d44;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 640px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .mode-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 4px;
    }

    .mode-btn {
      width: 100%;
      padding: 14px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mode-btn:hover { opacity: 0.88; }
    .mode-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .mode-btn.black { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .mode-btn.white { background: linear-gradient(135deg, #0ea5e9, #06b6d4); }
    .mode-btn.russia { background: linear-gradient(135deg, #ef4444, #f97316); }

    .mode-btn .btn-desc {
      font-size: 0.75rem;
      font-weight: 400;
      opacity: 0.8;
      margin-left: auto;
    }

    #status {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #94a3b8;
      min-height: 20px;
    }

    #progress-bar-wrap {
      margin-top: 12px;
      background: #2d2d44;
      border-radius: 999px;
      height: 6px;
      display: none;
    }
    #progress-bar {
      height: 6px;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      border-radius: 999px;
      width: 0%;
      transition: width 0.3s;
    }

    #log {
      margin-top: 20px;
      max-height: 220px;
      overflow-y: auto;
      font-size: 0.8rem;
      font-family: monospace;
      color: #64748b;
      display: none;
    }
    #log .found { color: #4ade80; }

    #result {
      display: none;
      margin-top: 24px;
    }

    .result-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6366f1;
      margin-bottom: 8px;
    }

    .key-box {
      background: #0f0f1a;
      border: 1px solid #3d3d5c;
      border-radius: 10px;
      padding: 14px 16px;
      font-family: monospace;
      font-size: 0.78rem;
      word-break: break-all;
      color: #a78bfa;
      line-height: 1.5;
    }

    .copy-btn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      background: #2d2d44;
      color: #e2e8f0;
      border: 1px solid #3d3d5c;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: #3d3d5c; }

    .top5 { margin-top: 20px; }
    .top5-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      padding: 6px 0;
      border-bottom: 1px solid #2d2d44;
      color: #94a3b8;
    }
    .top5-item:last-child { border-bottom: none; }
    .latency { color: #4ade80; font-weight: 600; }

    .stats {
      margin-top: 16px;
      text-align: center;
      font-size: 0.85rem;
      color: #64748b;
    }
    .stats span { color: #a78bfa; font-weight: 600; }
  </style>
</head>
<body>
  <h1>VLESS Key Checker</h1>
  <p class="subtitle">Автоматически находит лучший рабочий ключ</p>

  <div class="card">
    <div class="mode-buttons">
      <button class="mode-btn black" onclick="startCheck('black')">
        🔒 Обычный VPN
        <span class="btn-desc">BLACK list</span>
      </button>
      <button class="mode-btn white" onclick="startCheck('white')">
        🌐 Белые списки
        <span class="btn-desc">без Russia</span>
      </button>
      <button class="mode-btn russia" onclick="startCheck('russia')">
        🇷🇺 Белые списки — Москва
        <span class="btn-desc">только Russia</span>
      </button>
    </div>

    <div id="status"></div>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="log"></div>

    <div id="result">
      <div class="result-label">Лучший ключ</div>
      <div class="key-box" id="bestKey"></div>
      <button class="copy-btn" onclick="copyKey()">📋 Скопировать ключ</button>

      <div class="top5">
        <div class="result-label" style="margin-top:20px">Топ-5 самых быстрых</div>
        <div id="top5list"></div>
      </div>

      <div class="stats" id="statsLine"></div>
    </div>
  </div>

  <script>
    let total = 0, done = 0;
    let activeEs = null;

    function startCheck(mode) {
      if (activeEs) { activeEs.close(); activeEs = null; }

      document.querySelectorAll('.mode-btn').forEach(b => b.disabled = true);
      document.getElementById('result').style.display = 'none';
      document.getElementById('log').style.display = 'block';
      document.getElementById('log').innerHTML = '';
      document.getElementById('progress-bar-wrap').style.display = 'block';
      document.getElementById('progress-bar').style.width = '0%';
      document.getElementById('status').textContent = '';
      total = 0; done = 0;

      const es = new EventSource('/check?mode=' + mode);
      activeEs = es;

      es.onmessage = (e) => {
        const data = JSON.parse(e.data);
        const log = document.getElementById('log');

        if (data.type === 'status') {
          document.getElementById('status').textContent = data.msg;
          if (data.msg.includes('ключей')) {
            const match = data.msg.match(/\d+/);
            if (match) total = parseInt(match[0]);
          }
        } else if (data.type === 'found') {
          done++;
          const div = document.createElement('div');
          div.className = 'found';
          div.textContent = data.msg;
          log.appendChild(div);
          log.scrollTop = log.scrollHeight;
          if (total) document.getElementById('progress-bar').style.width = (done / total * 100) + '%';
        } else if (data.type === 'progress') {
          done++;
          if (total) document.getElementById('progress-bar').style.width = (done / total * 100) + '%';
        } else if (data.type === 'error') {
          document.getElementById('status').textContent = '❌ Ошибка: ' + data.msg;
          resetBtns();
          es.close();
        } else if (data.type === 'done') {
          document.getElementById('progress-bar').style.width = '100%';
          if (data.best) {
            document.getElementById('bestKey').textContent = data.best;
            const top5 = document.getElementById('top5list');
            top5.innerHTML = data.top5.map((r, i) =>
              '<div class="top5-item"><span>' + (i+1) + '. ' + r.host + ':' + r.port + '</span><span class="latency">' + r.latency_ms + ' мс</span></div>'
            ).join('');
            document.getElementById('statsLine').innerHTML =
              'Рабочих: <span>' + data.total_working + '</span> из <span>' + data.total + '</span>';
            document.getElementById('result').style.display = 'block';
            document.getElementById('status').textContent = '✅ Готово!';
          } else {
            document.getElementById('status').textContent = data.total === 0
              ? '😕 Ключей с таким фильтром не найдено в файле.'
              : '😕 Рабочих ключей не найдено. Попробуй позже.';
          }
          resetBtns();
          es.close();
        }
      };

      es.onerror = () => {
        document.getElementById('status').textContent = '❌ Ошибка соединения';
        resetBtns();
        es.close();
      };
    }

    function resetBtns() {
      document.querySelectorAll('.mode-btn').forEach(b => b.disabled = false);
      activeEs = null;
    }

    function copyKey() {
      const key = document.getElementById('bestKey').textContent;
      navigator.clipboard.writeText(key).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '✅ Скопировано!';
        setTimeout(() => btn.textContent = '📋 Скопировать ключ', 2000);
      });
    }
  </script>
</body>
</html>
