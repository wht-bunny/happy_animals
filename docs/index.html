<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bunny Check</title>

  <!-- SEO -->
  <meta name="description"
    content="Автоматическое обновление" />
  <meta name="keywords"
    content="Bunny check" />
  <meta name="author" content="rabbit" />
  <meta name="robots" content="index, follow" />

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <h1>Bunny Check</h1>
  <p class="subtitle" id="updated">Загружаем данные...</p>

  <div class="guide">
    <h3>Как пользоваться</h3>
    <ol>
      <li>Выбери страну в разделе <strong>Белые списки</strong></li>
      <li>Нажми <strong>Копировать</strong> и вставь ключ в приложение (Hiddify, v2rayTUN, Streisand)</li>
      <li>Ключи обновляются автоматически <strong>каждые 30 минут</strong></li>
    </ol>
  </div>

  <p class="section-label">Белые списки — выбери страну</p>
  <div class="tabs" id="tabs-white">
    <button class="tab" onclick="switchMode('w_baltics')">🇱🇹🇪🇪🇱🇻 Прибалтика</button>
    <button class="tab" onclick="switchMode('w_finland')">🇫🇮 Финляндия</button>
    <button class="tab" onclick="switchMode('w_germany')">🇩🇪 Германия</button>
    <button class="tab" onclick="switchMode('w_sweden')">🇸🇪 Швеция</button>
    <button class="tab" onclick="switchMode('w_netherlands')">🇳🇱 Нидерланды</button>
    <button class="tab" onclick="switchMode('w_poland')">🇵🇱 Польша</button>
    <button class="tab" onclick="switchMode('w_other')">🌍 Остальные</button>
    <button class="tab" onclick="switchMode('russia')">🇷🇺 Россия (Москва)</button>
  </div>

  <button class="collapsed-toggle" id="collapsed-toggle-white" onclick="toggleCollapsedWhite()">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 4l4 4 4-4" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    <span id="collapsed-label-white">Нет ключей: ...</span>
  </button>
  <div class="tabs-collapsed" id="tabs-collapsed-white"></div>

  <button class="refresh-btn" onclick="loadData()" style="margin-top:20px">Обновить</button>

  <div id="cards"></div>

  <script src="script.js?v=2"></script>
</body>

</html>
