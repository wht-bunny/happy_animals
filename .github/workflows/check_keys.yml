name: Check VLESS Keys

on:
  schedule:
    - cron: '17,47 * * * *'      # каждые 30 минут, но не ровно в :00 и :30 (меньше конкуренции)
  workflow_dispatch:             # позволяет запускать вручную

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'     # обновили до более новой версии

      - name: Install dependencies
        run: pip install requests

      - name: Run checker
        run: python check_and_save.py

      - name: Commit and push keys.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add docs/keys.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update keys.json [skip ci]"
            git pull --rebase origin main
            git push
          fi
